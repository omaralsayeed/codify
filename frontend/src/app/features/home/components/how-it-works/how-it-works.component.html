<section id="how" class="how-section section-pad">
  <div class="section-inner">
    <span class="section-tag tag-gold">How it works</span>
    <h2 class="section-h">From problem to insight<br/>in five steps</h2>
    <p class="section-sub">Codify isn't just a judge — it's a learning loop that grows with you.</p>

    <div class="steps-wrap">
      <!-- Steps list -->
      <div class="steps-list">
        <div
          class="step"
          [class.active]="activeIndex() === i"
          *ngFor="let s of steps; let i = index"
          (click)="setStep(i)"
        >
          <div class="step-num">{{ s.num }}</div>
          <div>
            <div class="step-title">{{ s.title }}</div>
            <div class="step-desc">{{ s.desc }}</div>
          </div>
        </div>
      </div>

      <!-- Preview panel -->
      <div class="steps-preview">
        <div class="preview-label">PREVIEW</div>
        <div class="preview-content" *ngIf="steps[activeIndex()] as s">
          <div class="preview-title">{{ s.previewTitle }}</div>
          <p class="preview-text">{{ s.previewText }}</p>
          <div class="preview-tags">
            <span
              class="preview-tag"
              [class.active]="t === s.activeTag"
              *ngFor="let t of s.tags"
            >{{ t }}</span>
          </div>
        </div>
        <div class="preview-bar">
          <div class="preview-fill" [style.width.%]="progress"></div>
        </div>
      </div>
    </div>
  </div>
</section>
