<div class="auth-container">
  <div class="auth-card">
    @if (!submitted) {
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your email to receive a password reset link</p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <div class="form-field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            [class.error]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
          />
          @if (getErrorMessage('email')) {
            <div class="error-message">{{ getErrorMessage('email') }}</div>
          }
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-primary"
          [disabled]="forgotForm.invalid"
        >
          Send Reset Link
        </button>

        <!-- Back to Login Link -->
        <p class="footer-text">
          <a routerLink="/auth/login" class="link-primary">Back to Login</a>
        </p>
      </form>
    } @else {
      <div class="success-screen">
        <div class="success-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <h1>Check Your Email</h1>
        <p class="success-message">If this email exists, a reset link has been sent.</p>
        <a routerLink="/auth/login" class="btn-primary">Back to Login</a>
      </div>
    }
  </div>
</div>
