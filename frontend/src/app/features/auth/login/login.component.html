<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to continue your coding journey</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        />
        @if (getErrorMessage('email')) {
          <div class="error-message">{{ getErrorMessage('email') }}</div>
        }
      </div>

      <!-- Password Field -->
      <div class="form-field">
        <label for="password">Password</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          />
          <button
            type="button"
            class="toggle-icon"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
        @if (getErrorMessage('password')) {
          <div class="error-message">{{ getErrorMessage('password') }}</div>
        }
      </div>

      <!-- Remember Me Checkbox -->
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>
        <a routerLink="/auth/forgot-password" class="link-secondary">Forgot password?</a>
      </div>

      <!-- Login Error -->
      @if (loginError) {
        <div class="error-banner">{{ loginError }}</div>
      }

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="loginForm.invalid"
      >
        Log In
      </button>

      <!-- Register Link -->
      <p class="footer-text">
        Don't have an account?
        <a routerLink="/auth/register" class="link-primary">Sign up</a>
      </p>
    </form>
  </div>
</div>
